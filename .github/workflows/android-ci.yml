name: Android CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Build Go mobile AAR
        run: bash ./android/build_go_mobile.sh

      - name: Build Debug APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew :app:assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: goose-relay-android-debug-universal-apk
          path: android/app/build/outputs/apk/debug/app-universal-debug.apk

      - name: Upload Go AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: gooserelayvpn-aar
          path: android/app/libs/gooserelayvpn.aar

